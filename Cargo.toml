[package]
name = "zellij-sheets"
version = "0.1.0"
edition = "2021"
description = "Terminal-based spreadsheet viewer powered by Zellij"

[dependencies]
zellij-term = "0.51.0"
polars = { version = "0.53", features = ["lazy", "temporal"] }
calamine = "0.33"
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
chrono = { version = "0.4", features = ["serde"] }
toml = "0.8"
thiserror = "2.0"
csv = "1.3"

[features]
default = ["zellij-term/sixel"]
